<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <!-- Background -->
  <rect width="800" height="400" fill="#ffffff"/>

  <!-- Definitions for arrowheads -->
  <defs>
    <marker id="arrowRight" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4a5568"/>
    </marker>
    <marker id="arrowLeft" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="10 0, 0 3.5, 10 7" fill="#4a5568"/>
    </marker>
    <!-- Drop shadow filter -->
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.15" flood-color="#000"/>
    </filter>
  </defs>

  <!-- ======================== -->
  <!-- Center Box: Beckhoff PLC -->
  <!-- ======================== -->
  <rect x="290" y="120" width="220" height="160" rx="10" ry="10" fill="#1a365d" filter="url(#shadow)"/>
  <text x="400" y="192" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="20" font-weight="700" fill="#ffffff">Beckhoff PLC</text>
  <text x="400" y="222" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="16" font-weight="400" fill="#a0aec0">(TwinCAT 3)</text>

  <!-- ======================== -->
  <!-- Top-Left Box: SCADA      -->
  <!-- ======================== -->
  <rect x="40" y="80" width="150" height="80" rx="8" ry="8" fill="#2b6cb0" filter="url(#shadow)"/>
  <text x="115" y="127" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="18" font-weight="600" fill="#ffffff">SCADA</text>

  <!-- Top-Right Box: UR -->
  <rect x="610" y="80" width="150" height="80" rx="8" ry="8" fill="#2b6cb0" filter="url(#shadow)"/>
  <text x="685" y="127" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="18" font-weight="600" fill="#ffffff">UR</text>

  <!-- Bottom-Left Box: Crane -->
  <rect x="40" y="240" width="150" height="80" rx="8" ry="8" fill="#2b6cb0" filter="url(#shadow)"/>
  <text x="115" y="287" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="18" font-weight="600" fill="#ffffff">Crane</text>

  <!-- Bottom-Right Box: AGV -->
  <rect x="610" y="240" width="150" height="80" rx="8" ry="8" fill="#2b6cb0" filter="url(#shadow)"/>
  <text x="685" y="287" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="18" font-weight="600" fill="#ffffff">AGV</text>

  <!-- ======================================= -->
  <!-- Arrows: SCADA <--> PLC (top-left)       -->
  <!-- ======================================= -->
  <!-- Forward arrow (SCADA -> PLC) -->
  <line x1="190" y1="155" x2="285" y2="175" stroke="#4a5568" stroke-width="2" marker-end="url(#arrowRight)"/>
  <!-- Reverse arrow (PLC -> SCADA) -->
  <line x1="285" y1="185" x2="190" y2="165" stroke="#4a5568" stroke-width="2" marker-end="url(#arrowLeft)"/>
  <!-- Label: ADS -->
  <rect x="213" y="148" width="48" height="22" rx="4" ry="4" fill="#edf2f7"/>
  <text x="237" y="164" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" font-weight="600" fill="#2d3748">ADS</text>

  <!-- ======================================= -->
  <!-- Arrows: UR <--> PLC (top-right)         -->
  <!-- ======================================= -->
  <!-- Forward arrow (PLC -> UR) -->
  <line x1="515" y1="175" x2="605" y2="155" stroke="#4a5568" stroke-width="2" marker-end="url(#arrowRight)"/>
  <!-- Reverse arrow (UR -> PLC) -->
  <line x1="605" y1="165" x2="515" y2="185" stroke="#4a5568" stroke-width="2" marker-end="url(#arrowLeft)"/>
  <!-- Label: OPC UA -->
  <rect x="527" y="148" width="68" height="22" rx="4" ry="4" fill="#edf2f7"/>
  <text x="561" y="164" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" font-weight="600" fill="#2d3748">OPC UA</text>

  <!-- ======================================= -->
  <!-- Arrows: Crane <--> PLC (bottom-left)    -->
  <!-- ======================================= -->
  <!-- Forward arrow (Crane -> PLC) -->
  <line x1="190" y1="245" x2="285" y2="225" stroke="#4a5568" stroke-width="2" marker-end="url(#arrowRight)"/>
  <!-- Reverse arrow (PLC -> Crane) -->
  <line x1="285" y1="215" x2="190" y2="235" stroke="#4a5568" stroke-width="2" marker-end="url(#arrowLeft)"/>
  <!-- Label: ADS -->
  <rect x="213" y="218" width="48" height="22" rx="4" ry="4" fill="#edf2f7"/>
  <text x="237" y="234" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" font-weight="600" fill="#2d3748">ADS</text>

  <!-- ======================================= -->
  <!-- Arrows: AGV <--> PLC (bottom-right)     -->
  <!-- ======================================= -->
  <!-- Forward arrow (PLC -> AGV) -->
  <line x1="515" y1="225" x2="605" y2="245" stroke="#4a5568" stroke-width="2" marker-end="url(#arrowRight)"/>
  <!-- Reverse arrow (AGV -> PLC) -->
  <line x1="605" y1="235" x2="515" y2="215" stroke="#4a5568" stroke-width="2" marker-end="url(#arrowLeft)"/>
  <!-- Label: OPC UA -->
  <rect x="527" y="218" width="68" height="22" rx="4" ry="4" fill="#edf2f7"/>
  <text x="561" y="234" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" font-weight="600" fill="#2d3748">OPC UA</text>
</svg>